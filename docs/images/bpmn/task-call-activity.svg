<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 55" width="130" height="50">
  <!-- thick border = call activity -->
  <rect x="2" y="2" width="86" height="42" rx="6" fill="white" stroke="#333" stroke-width="3.5"/>
  <text x="45" y="24" text-anchor="middle" font-size="11" fill="#333" font-family="Arial" font-weight="500">Call Activity</text>
  <!-- [+] expand marker at bottom center -->
  <rect x="38" y="33" width="14" height="8" rx="1" fill="white" stroke="#333" stroke-width="1.2"/>
  <line x1="45" y1="35" x2="45" y2="39" stroke="#333" stroke-width="1.2"/>
  <line x1="43" y1="37" x2="47" y2="37" stroke="#333" stroke-width="1.2"/>
  <text x="45" y="52" text-anchor="middle" font-size="8" fill="#777" font-family="Arial">calls external sub-process</text>
</svg>
