  <circle cx="25" cy="25" r="18" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- envelope outline (catch = unfilled) -->
  <rect x="13" y="18" width="24" height="15" rx="1" fill="white" stroke="#333" stroke-width="1.3"/>
  <polyline points="13,18 25,27 37,18" fill="none" stroke="#333" stroke-width="1.3"/>
  <text x="25" y="48" text-anchor="middle" font-size="7" fill="#555" font-family="Arial">Msg Catch</text>
</svg>
