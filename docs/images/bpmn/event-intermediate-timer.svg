<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="45" height="45">
  <!-- double border = intermediate -->
  <circle cx="25" cy="25" r="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="25" cy="25" r="18" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- clock face -->
  <circle cx="25" cy="25" r="11" fill="white" stroke="#333" stroke-width="1.2"/>
  <line x1="25" y1="15" x2="25" y2="18" stroke="#333" stroke-width="1.2"/>
  <line x1="25" y1="32" x2="25" y2="35" stroke="#333" stroke-width="1.2"/>
  <line x1="15" y1="25" x2="18" y2="25" stroke="#333" stroke-width="1.2"/>
  <line x1="32" y1="25" x2="35" y2="25" stroke="#333" stroke-width="1.2"/>
  <line x1="25" y1="25" x2="25" y2="19" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="25" y1="25" x2="30" y2="25" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>
  <text x="25" y="48" text-anchor="middle" font-size="8" fill="#555" font-family="Arial">Timer (Int.)</text>
</svg>
