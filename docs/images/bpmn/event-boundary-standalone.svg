<svg xmlns="http://www.w3.org/2000/svg" width="140" height="72" viewBox="0 0 110 60">
  <!-- Task box -->
  <rect x="5" y="5" width="70" height="35" rx="5" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="40" y="27" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">Task</text>
  <!-- Boundary event circle (double border) centered on bottom edge of task -->
  <circle cx="40" cy="40" r="11" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="40" cy="40" r="8" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Timer icon inside boundary event -->
  <circle cx="40" cy="40" r="5" fill="white" stroke="#333" stroke-width="0.8"/>
  <line x1="40" y1="36" x2="40" y2="37.5" stroke="#333" stroke-width="0.7"/>
  <line x1="40" y1="42.5" x2="40" y2="44" stroke="#333" stroke-width="0.7"/>
  <line x1="36" y1="40" x2="37.5" y2="40" stroke="#333" stroke-width="0.7"/>
  <line x1="42.5" y1="40" x2="44" y2="40" stroke="#333" stroke-width="0.7"/>
  <line x1="40" y1="40" x2="40" y2="37.5" stroke="#333" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="40" y1="40" x2="42.5" y2="40" stroke="#333" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Label -->
  <text x="40" y="57" font-family="Arial, sans-serif" font-size="7" fill="#555" text-anchor="middle">Boundary Event</text>
</svg>
