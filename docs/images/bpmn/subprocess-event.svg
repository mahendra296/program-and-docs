<svg xmlns="http://www.w3.org/2000/svg" width="140" height="52" viewBox="0 0 100 55">
  <!-- Outer border (thin) -->
  <rect x="2" y="2" width="96" height="51" rx="5" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Dashed inner top line to indicate event sub-process -->
  <rect x="5" y="5" width="90" height="45" rx="4" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Small start event circle in top-left -->
  <circle cx="14" cy="14" r="7" fill="white" stroke="#333" stroke-width="1.2"/>
  <!-- Label -->
  <text x="55" y="22" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Event Sub-Process</text>
  <!-- [+] marker at bottom center -->
  <rect x="42" y="38" width="16" height="11" rx="1" fill="white" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="40" x2="50" y2="47" stroke="#333" stroke-width="1.2"/>
  <line x1="46" y1="43.5" x2="54" y2="43.5" stroke="#333" stroke-width="1.2"/>
</svg>
