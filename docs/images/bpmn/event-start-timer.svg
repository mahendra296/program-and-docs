<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="45" height="45">
  <circle cx="25" cy="25" r="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- clock face -->
  <circle cx="25" cy="25" r="12" fill="white" stroke="#333" stroke-width="1.2"/>
  <!-- tick marks -->
  <line x1="25" y1="14" x2="25" y2="17" stroke="#333" stroke-width="1.2"/>
  <line x1="25" y1="33" x2="25" y2="36" stroke="#333" stroke-width="1.2"/>
  <line x1="14" y1="25" x2="17" y2="25" stroke="#333" stroke-width="1.2"/>
  <line x1="33" y1="25" x2="36" y2="25" stroke="#333" stroke-width="1.2"/>
  <!-- clock hands -->
  <line x1="25" y1="25" x2="25" y2="18" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="25" y1="25" x2="30" y2="25" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>
  <text x="25" y="48" text-anchor="middle" font-size="9" fill="#555" font-family="Arial">Timer</text>
</svg>
